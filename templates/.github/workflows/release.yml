name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else echo "replace with your install command"; fi

      - name: Build
        run: |
          if npm run | grep -q " build"; then npm run build; else echo "replace with your build command"; mkdir -p dist && echo placeholder > dist/artifact.txt; fi

      - name: Package artifact
        run: |
          mkdir -p release-artifacts
          if [ -d dist ]; then tar -czf release-artifacts/app.tar.gz dist; else echo "replace with your packaging command"; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: release-artifacts/app.tar.gz

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: release-artifacts/app.tar.gz

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -n "$VERSION" ]; then TAG="v$VERSION"; fi
          gh release create "$TAG" \
            release-artifacts/app.tar.gz \
            --generate-notes \
            --title "$TAG"
