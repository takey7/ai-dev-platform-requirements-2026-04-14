name: ai-gate

on:
  workflow_call:
    inputs:
      manifest_path:
        required: false
        type: string
        default: .platform/platform.yaml

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-gate:
    name: ai-gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Codex policy gate
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          output-file: codex-result.json
          prompt: |
            Return STRICT JSON and nothing else.
            Schema:
            {
              "ship": "yes|no",
              "risk_level": "low|medium|high",
              "breaking_change": true,
              "rollback_ready": true,
              "reasons": ["..."],
              "missing": ["..."]
            }

            Review ONLY the current diff against the default branch.
            Use the issue spec and manifest when present.
            Focus on:
            - hidden breakage
            - schema / migration risk
            - auth / security regressions
            - rollback readiness
            - whether rollout strategy is explicit

      - name: Show Codex result
        run: cat codex-result.json

      - name: Validate JSON
        run: jq . codex-result.json > /dev/null

      - name: Fail if not shippable
        run: |
          SHIP=$(jq -r '.ship' codex-result.json)
          if [ "$SHIP" != "yes" ]; then
            echo "AI gate blocked this PR"
            exit 1
          fi

      - name: Comment result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const body = "## AI gate result\n```json\n" + fs.readFileSync("codex-result.json", "utf8") + "\n```";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
