name: ai-gate

on:
  workflow_call:
    inputs:
      manifest_path:
        required: false
        type: string
        default: .platform/platform.yaml

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-gate:
    name: ai-gate
    runs-on: ubuntu-latest

    steps:
      - name: Explain login-based Codex review path
        run: |
          echo "This repository uses login-based Codex reviews."
          echo "No OPENAI_API_KEY secret is required in GitHub Actions."
          echo "Use the ChatGPT-connected Codex GitHub integration for automatic reviews or mention @codex on the PR."

      - name: Comment review guidance on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = "<!-- platform-ai-gate -->";
            const body = [
              marker,
              "## AI gate",
              "",
              "This repository uses login-based Codex reviews instead of `OPENAI_API_KEY`-backed GitHub Actions.",
              "Enable automatic Codex reviews in GitHub or mention `@codex` on the PR when you want an AI review."
            ].join("\n");
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            if (comments.some((comment) => comment.body && comment.body.includes(marker))) {
              core.info("AI gate guidance comment already exists.");
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
