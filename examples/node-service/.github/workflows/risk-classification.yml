name: risk-classification

on:
  pull_request:
  merge_group:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  risk-classification:
    uses: slm100/ai-dev-platform-requirements-2026-04-14/.github/workflows/risk-classification.yml@main
    with:
      manifest_path: .platform/platform.yaml
      base_ref: ${{ github.base_ref || github.event.merge_group.base_ref || github.event.repository.default_branch }}
    secrets: inherit
